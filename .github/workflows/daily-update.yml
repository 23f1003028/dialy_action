name: Daily Update by 23f1003028@ds.study.iitm.ac.in  # Includes your email as required

on:
  schedule:
    - cron: '0 22 * * *'  # Runs daily at 10 PM UTC (specific time: 22:00, no wildcards except days)
  workflow_dispatch:  # Lets you trigger manually for testing

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo  # Downloads your repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}  # Needed for commits

      - name: Update status file by 23f1003028@ds.study.iitm.ac.in  # Step with your email
        run: |
          echo "$(date): Daily automated update for DevSync compliance." >> STATUS.md  # Adds a timestamped line to a file

      - name: Commit changes
        run: |
          git config user.name "DevSync Bot"
          git config user.email "23f1003028@ds.study.iitm.ac.in"
          git add STATUS.md
          git commit -m "Daily update: Activity tracking and compliance [skip ci]" || echo "No changes"
          git push
