name: CI  # Name your workflow (use this exact name later if needed)

on:
  push:
    branches: [ main ]  # Runs on pushes to main branch
  workflow_dispatch:  # Lets you trigger it manually (key for testing!)

jobs:
  test:
    runs-on: ubuntu-latest  # Free GitHub server to run on
    steps:
      - uses: actions/checkout@v4  # Grabs your code
      - name: Success step  # Does nothing but pass
        run: echo "All good!"  # Prints a message
